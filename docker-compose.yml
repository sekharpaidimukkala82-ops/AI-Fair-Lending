version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fairlend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fairlending
      POSTGRES_USER: fairlend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-FairLend@DB2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairlend -d fairlending"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fairlend_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-FairLend@Redis2024}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-FairLend@Redis2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fairlend_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fairlend:${POSTGRES_PASSWORD:-FairLend@DB2024}@postgres:5432/fairlending
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-FairLend@Redis2024}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-FairLend@Redis2024}@redis:6379/1
    volumes:
      - uploads_data:/app/backend/uploads
      - chroma_data:/app/backend/chroma_db
      - models_data:/app/backend/models_store
      - reports_data:/app/backend/reports
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fairlend_celery_worker
    restart: unless-stopped
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,processing,ml,reports
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fairlend:${POSTGRES_PASSWORD:-FairLend@DB2024}@postgres:5432/fairlending
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-FairLend@Redis2024}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-FairLend@Redis2024}@redis:6379/1
    volumes:
      - uploads_data:/app/backend/uploads
      - chroma_data:/app/backend/chroma_db
      - models_data:/app/backend/models_store
      - reports_data:/app/backend/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fairlend_celery_beat
    restart: unless-stopped
    command: celery -A backend.workers.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fairlend:${POSTGRES_PASSWORD:-FairLend@DB2024}@postgres:5432/fairlending
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-FairLend@Redis2024}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-FairLend@Redis2024}@redis:6379/1
    volumes:
      - celerybeat_data:/app/celerybeat
    depends_on:
      - redis

  # ── React Frontend (Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: fairlend_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  chroma_data:
  models_data:
  reports_data:
  celerybeat_data:
